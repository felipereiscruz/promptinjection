            font-size: 11px;
            color: #00ffff;

            border-color: #00ffff;

        }

            color: #4a5a7a;

            padding: 14px;
            background: linear-gradient(90deg, #00aaff, #00ffff);
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: bold;
            color: #0a0e27;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 255, 255, 0.3);
        }

        .error-message {
            background: rgba(255, 50, 50, 0.15);
            border-left: 3px solid #ff3366;
            color: #ff99aa;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 13px;
            display: none;
        }

        .flower-container {
            margin-top: 25px;
            padding: 20px;
            background: rgba(0, 30, 40, 0.6);
            border-radius: 20px;
            text-align: center;
            display: none;
            border: 1px dashed #00ffff;

            color: #00ffff;
            margin-bottom: 15px;
            font-size: 18px;

            box-shadow: 0 0 5px #00ffaa;
